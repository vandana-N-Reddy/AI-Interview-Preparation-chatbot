
<!DOCTYPE html>
<html>
<head>
<title>AI Study Plan Generator</title>
<meta charset="UTF-8">
<style>
body { font-family: Arial; background:#f4f6f8; }
.container {
  width:420px; margin:40px auto; background:white;
  padding:20px; border-radius:10px;
}
input, button { width:100%; padding:10px; margin-top:10px; }
pre { background:#eee; padding:10px; white-space:pre-wrap; }
</style>
</head>
<body>
<div class="container">
<h2>📚 AI Study Plan Generator</h2>
<input id="subject" placeholder="Subject">
<input id="hours" placeholder="Hours per day">
<input id="exam" placeholder="Exam Date">
<input id="level" placeholder="Beginner / Intermediate / Advanced">
<button onclick="generatePlan()">Generate Plan</button>
<pre id="result">Result will appear here...</pre>
</div>
<script>
async function generatePlan() {
  const subject = document.getElementById("subject").value;
  const hours = document.getElementById("hours").value;
  const exam = document.getElementById("exam").value;
  const level = document.getElementById("level").value;

  const res = await fetch("http://127.0.0.1:5000/generate-plan", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({
      subject: subject,
      hours: hours,
      exam_date: exam,
      level: level
    })
  });
  const data = await res.json();
  document.getElementById("result").textContent = data.study_plan;
}
</script>
</body>
</html>
